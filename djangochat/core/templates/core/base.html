{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>{% block title %}{% endblock title %}</title>
  
</head>
<body class="bg-teal-600">
  <nav class="flex items-center justify-between px-4 py-6 bg-teal-800">
    <div>
      <a href="/" class="text-xl text-white">DjangoChatApp</a>
    </div>

    <div class="flex items-center space-x-4">
      {% if not user.is_authenticated %}
        <a href="login/" class="text-white hover:text-gray-300">Log In</a>
        <a href="{% url 'signup' %}" class="px-5 py-3 rounded-xl bg-teal-600 text-white hover:bg-teal-700">Sign Up</a>
      {% else %}
        <a href="/rooms/" class="text-white hover:text-gray-300">Rooms</a>
        <form method="POST" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="px-5 py-3 rounded-xl bg-teal-600 text-white hover:bg-teal-700">Log Out</button>
        </form>
      {% endif %}
    </div>
  </nav>

  {% block content %}{% endblock content %}

</body>
</html>
