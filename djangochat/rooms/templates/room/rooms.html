{% extends "core/base.html" %}

{% block title %}Rooms | {% endblock title %}

{% block content %}
<div class="pt-10 lg:pt-20 text-center">
    <h1 class="text-3xl lg:text-6xl text-white font-bold">Rooms</h1>
</div>

<div class="max-w-6xl mx-auto px-4 py-10 flex flex-wrap justify-center items-center">
    {% for room in rooms %}
        <div class="w-full sm:w-1/2 lg:w-1/3 p-3">
            <div class="p-6 bg-white shadow-lg rounded-xl text-center transform transition hover:scale-105 duration-200">
                 <h2 class="mb-5 text-2xl font-bold text-gray-800">{{ room.name }}</h2>
                 <a href="{% url 'room_detail' room.slug %}" class="px-5 py-3 block rounded-xl font-semibold text-white bg-teal-600 hover:bg-teal-700 transition-colors">Join</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock content %}
